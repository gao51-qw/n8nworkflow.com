<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>n8n Workflow Viewer</title>
  <script src="https://cdn.jsdelivr.net/npm/@webcomponents/webcomponentsjs@2.0.0/webcomponents-loader.js"></script>
  <script src="https://www.unpkg.com/lit@2.0.0-rc.2/polyfill-support.js"></script>
  <script type="module" src="https://cdn.jsdelivr.net/npm/@n8n_io/n8n-demo-component/n8n-demo.bundled.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f8f8f8;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    #container {
      width: 1400px;
      height: 1000px;
      background: white;
      border: none;
      position: relative;
    }
    n8n-demo {
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      height: 100%;
    }
    /* 隐藏组件自带的控制按钮，让截图更纯净 */
    n8n-demo::part(controls) {
      display: none;
    }
  </style>
</head>
<body>
  <div id="container">
    <n8n-demo id="workflow" theme="light" frame="false" clicktointeract="false" disableinteractivity="true"></n8n-demo>
  </div>
  <script>
    /**
     * 渲染工作流数据
     * @param {Object} data 工作流 JSON 数据
     */
    window.renderWorkflow = async (data) => {
      console.log('Starting render for workflow:', data.name || 'unnamed');
      const viz = document.getElementById('workflow');
      
      if (!viz) {
        throw new Error('n8n-demo element not found');
      }

      try {
        // n8n-demo 组件需要的是 workflow 字段中的内容，或者如果已经是工作流格式则直接使用
        const workflowData = data.workflow || data;
        
        // 确保数据是字符串
        viz.workflow = JSON.stringify(workflowData);
      } catch (e) {
        console.error('Failed to set workflow data:', e);
        throw e;
      }

      // 返回一个 Promise，确保渲染完成
      return new Promise((resolve, reject) => {
        const timeout = setTimeout(() => {
          console.warn('Render timeout reached, resolving anyway');
          resolve(true);
        }, 20000);

        const checkRender = () => {
          const shadow = viz.shadowRoot;
          if (shadow) {
            // 检查 iframe 是否加载
            const iframe = shadow.querySelector('iframe');
            if (iframe) {
              // 监听 iframe 的消息
              window.addEventListener('message', (event) => {
                if (event.data && typeof event.data === 'string') {
                  try {
                    const msg = JSON.parse(event.data);
                    if (msg.command === 'n8nReady') {
                      console.log('n8n iframe is ready');
                    }
                  } catch (e) {}
                }
              });
            }

            // 检查是否渲染了 SVG 或 Canvas (在 iframe 内部)
            // 注意：由于同源策略，我们可能无法直接访问 iframe 内部
            // 但是 n8n-demo 组件会将内容渲染到自己的 shadowRoot 中吗？
            // 根据分析，n8n-demo 内部其实是一个 iframe
            
            // 如果我们无法检测内部渲染，我们只能依靠时间
            // 或者检查 shadowRoot 中是否有特定的元素
            
            const hasIframe = !!shadow.querySelector('iframe');
            if (hasIframe) {
              console.log('Iframe detected, waiting for content...');
              // 既然有了 iframe，我们等几秒钟让它加载
              setTimeout(() => {
                clearTimeout(timeout);
                resolve(true);
              }, 5000);
              return;
            }
          }
          requestAnimationFrame(checkRender);
        };
        
        checkRender();
      });
    };

    // 暴露一个状态检查函数供 Puppeteer 使用
    window.isRendered = () => {
      const viz = document.getElementById('workflow');
      return !!(viz && viz.shadowRoot && (viz.shadowRoot.querySelector('svg') || viz.shadowRoot.querySelector('.workflow-canvas')));
    };
  </script>
</body>
</html>
